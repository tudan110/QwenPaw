apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qwenpaw.fullname" . }}
  labels:
    {{- include "qwenpaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qwenpaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qwenpaw.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            {{- if .Values.persistence.workingDir.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.workingDir.mountPath }}
              subPath: {{ .Values.persistence.workingDir.subPath }}
            {{- end }}
            {{- if .Values.persistence.secretDir.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.secretDir.mountPath }}
              subPath: {{ .Values.persistence.secretDir.subPath }}
            {{- end }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "qwenpaw.fullname" . }}-data
          {{- end }}
      {{- end }}
      restartPolicy: Always
