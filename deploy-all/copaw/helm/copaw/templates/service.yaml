apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name | default (include "copaw.fullname" .) }}
  labels:
    {{- include "copaw.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
      protocol: TCP
      name: http
  selector:
    {{- include "copaw.selectorLabels" . | nindent 4 }}
