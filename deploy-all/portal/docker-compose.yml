services:
  portal:
    image: digital-workforce-portal:0.1.0
    container_name: portal
    restart: no
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
      - PORTAL_APP_TITLE=数字员工门户
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
